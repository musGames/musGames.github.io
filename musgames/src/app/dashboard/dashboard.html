<div class="dashboard-wrapper">

  <div class="dashboard-content">

    <div class="featured-section" *ngIf="featuredGames.length > 0">

      <button class="featured-nav-btn featured-nav-left" type="button" (click)="previousFeaturedCard()">‹</button>

      <div
        *ngFor="let game of featuredGames; let i = index"
        [class]="getFeaturedCardClass(i)">

        <a [routerLink]="['/game', game.id]" class="featured-card-link">
          <img [src]="game.imageUrl" alt="{{ game.title }}" />

          <div class="featured-card-content">
            <h1>{{ game.title }}</h1>
            <p>Play the newest game on Arcade.IO</p>

            <div class="featured-card-actions">
              <span class="play-label">PLAY</span>
              <span class="play-circle">▶</span>
            </div>
          </div>
        </a>

      </div>

      <button class="featured-nav-btn featured-nav-right" type="button" (click)="nextFeaturedCard()">›</button>

    </div>

    <div class="games-header">
      <h2>Games</h2>

      <div class="games-header-actions">
        <a routerLink="/dashboard" class="view-all-link">View all</a>
        <button class="small-scroll-btn" type="button" (click)="scrollLeft()">‹</button>
        <button class="small-scroll-btn" type="button" (click)="scrollRight()">›</button>
      </div>
    </div>

    <div class="scroll-section">

      <div class="scroll-container" #scrollContainer>
        <div class="game-card" *ngFor="let game of games">
          <a [routerLink]="['/game', game.id]" class="game-card-link">
            <img [src]="game.imageUrl" alt="{{ game.title }}" />

            <div class="game-card-content">
              <p class="game-title">{{ game.title }}</p>
            </div>
          </a>
        </div>
      </div>

    </div>

  </div>

</div>
