<div class="forgot-password-container">

    <div class="forgot-password-box">
<h2>Forgot Password</h2>
<br>

<div class="input-group">
    <input 
    type="email" 
    [value]="email" 
    (input)="sendEmail($event)"
    (keyup.enter)="resetPassword()"
    placeholder="E-mail" />
</div>
<br>
<button class="reset-btn" (click)="resetPassword()">Send Reset Link</button>
                <button class="login-btn"(click)="goToLogin()">Login</button>

</div>

 <div *ngIf="errorMessage" [ngClass]="{ 'error-box': isError, 'success-box': !isError }">
    {{ errorMessage }}


    </div>


    </div>
