<div class="signup-container" >
    <div class="signup-box">
        <h2>Signup</h2>

        <!-- username input -->
        <div class="input-group">
            <input type="name"
             [value]="name" 
             (input)="updateName($event)" 
             placeholder="Enter your username"
             requiered
     
            />
        </div>

         <!-- email input -->
        <div class="input-group">
            <input type="email" 
            [value]="email" 
            (input)="updateEmail($event)" 
            autocomplete="email"
            placeholder="Enter your e-mail"/>
        </div>

         <!-- confirm email input -->
        <div class="input-group">
            <input type="email"
             [value]="emailConfirm" 
             (input)="updateEmailConfirm($event)" 
             autocomplete="email"
             placeholder="Confirm your e-mail"/>
        </div>

         <!-- password input -->
        <div class="input-group">
            <input type="password"
             [value]="password" 
             (input)="updatePassword($event)"
             autocomplete="new-password"
            placeholder="Enter your password" />
        </div>

         <!-- confirm password input -->
        <div class="input-group">
            <input type="password" 
            [value]="passwordConfirm" 
            (input)="updatePasswordConfirm($event)"
            autocomplete="new-password"
            placeholder="Confirm your password"/>
        </div>

        <!-- signup button -->
        <button class="signup-btn" type="button" (click)="register()">Signup</button>
        <!-- login section -->
        <p class="login-text"> Already have an account?

        <button class="login-btn"(click)="goToLogin()">Login</button>
        
        </p>
    </div>
</div>
