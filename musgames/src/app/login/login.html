<div class="login-container">
    <div class="login-box">
        <h2>Login</h2>

        <!-- login form -->
       <form (submit)="login($event)">
        <div class="input-group"> 
        <input type="email"
           name="email"
           placeholder="E-mail"
           [value]="email"
           (input)="sendEmail($event)"
            autocomplete="email"
            required />
        </div>
<div>version 1.1</div>
         <!-- password input -->
        <div class="input-group">
            <input 
             type="password"
             name="password"
             placeholder="Password"
             [value]="password"
             (input)="sendPassword($event)"
             autocomplete="current-password"
             required />
    
        </div>
        
         <!-- login button -->
        <button class="login-btn" type="submit">Login</button>
       </form> 

       <!-- goes to signup page -->
       <p class="sign-up">
        Don't have an account?
        <button class="signup-button" type="button" (click)="goToSignup()">Signup</button>
       </p>

        <!-- forgot password section -->
       <p class="forgot-password-text"> 
        <button class="forgot-password-button" type="button" (click)="forgotPassword()">Forgot Password?</button>
       </p>
    </div>

    <!--shows error message if there is one-->
    <div *ngIf="errorMessage" class="error-box"> {{errorMessage}}</div>


</div>
